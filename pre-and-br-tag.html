<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Pre and br tag</title>
</head>
<body>
    <p> Hello, how are you?
        I am fine </p>
    <pre> Hello, how are you?
           I am fine </pre>
    <p> Hello, <br> how are you?</p>           
</body>
</html>
