<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blink and heading tag</title>
</head>
<body>
    <blink>Aditya and Anugrah</blink>

    <h6>Papaya</h6>
</body>
