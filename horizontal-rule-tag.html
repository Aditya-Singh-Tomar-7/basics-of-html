<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>horizontal rule tag or hr tag</title>
</head>
<body>
    <p>Hello dear</p>
    <hr align="center">
    <hr width="30%" size="30" color="green" align="left">
    <p align="right">Aditya</p>
    <hr width="40%" size="35" color="red" align="right"    
</body>
</html>
